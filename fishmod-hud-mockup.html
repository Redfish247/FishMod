<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FishMod HUD Mockup</title>
<style>
  :root {
    --accent: #00AACC;
    --accent-hover: #00CCEE;
    --bg: #0d1014;
    --panel: #161a20;
    --panel-2: #1d222b;
    --border: #2a303a;
    --text: #e6e9ee;
    --muted: #8b94a3;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: "Segoe UI", system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    display: grid;
    grid-template-columns: 1fr 320px;
    height: 100vh;
    overflow: hidden;
  }

  /* ---------- Game preview (left) ---------- */
  #stage {
    position: relative;
    overflow: hidden;
    /* fake minecraft sky/world backdrop */
    background:
      linear-gradient(180deg, #6ab7ff 0%, #b6e0ff 55%, #4a7a3a 55%, #2f5226 100%);
  }
  #stage::after {
    content: "DRAG HUD ELEMENTS TO REPOSITION  ·  SCROLL OVER ONE TO RESIZE";
    position: absolute;
    top: 10px; left: 0; right: 0;
    text-align: center;
    font-size: 12px;
    letter-spacing: .5px;
    color: rgba(255,255,255,.85);
    text-shadow: 1px 1px 0 rgba(0,0,0,.6);
    pointer-events: none;
  }

  .hud {
    position: absolute;
    min-width: 90px;
    padding: 6px 9px;
    font-size: 13px;
    line-height: 1.45;
    color: #fff;
    text-shadow: 1px 1px 0 rgba(0,0,0,.7);
    background: rgba(8,12,16,.55);
    border: 1px solid var(--accent);
    border-radius: 3px;
    cursor: grab;
    user-select: none;
    transform-origin: top left;
    white-space: nowrap;
  }
  .hud.dragging { cursor: grabbing; border-color: var(--accent-hover); background: rgba(0,170,204,.25); }
  .hud .title { color: var(--accent-hover); font-weight: 600; margin-bottom: 2px; }
  .hud .row { display: flex; justify-content: space-between; gap: 14px; }
  .hud .val { color: #ffe08a; }
  .hud.hidden { display: none; }

  /* ---------- Control panel (right) ---------- */
  #panel {
    background: var(--panel);
    border-left: 1px solid var(--border);
    padding: 16px;
    overflow-y: auto;
  }
  #panel h1 {
    font-size: 15px;
    margin: 0 0 2px;
    letter-spacing: .5px;
  }
  #panel h1 .dot { color: var(--accent); }
  #panel .sub { color: var(--muted); font-size: 12px; margin-bottom: 16px; }

  .section { margin-bottom: 18px; }
  .section > .label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .ctrl { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; font-size: 13px; }
  .ctrl label { flex: 1; }
  .ctrl input[type=range] { flex: 1.4; accent-color: var(--accent); }
  .ctrl input[type=color] {
    width: 30px; height: 24px; padding: 0; border: 1px solid var(--border);
    background: none; border-radius: 4px; cursor: pointer;
  }
  .ctrl .num { width: 42px; text-align: right; color: var(--muted); font-variant-numeric: tabular-nums; }

  .elem-card {
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 12px;
    margin-bottom: 10px;
  }
  .elem-card .head { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .elem-card .head .name { font-weight: 600; flex: 1; }

  /* toggle switch */
  .switch { position: relative; width: 36px; height: 20px; }
  .switch input { opacity: 0; width: 0; height: 0; }
  .slide {
    position: absolute; inset: 0; background: var(--border);
    border-radius: 20px; transition: .15s; cursor: pointer;
  }
  .slide::before {
    content: ""; position: absolute; height: 14px; width: 14px; left: 3px; top: 3px;
    background: #fff; border-radius: 50%; transition: .15s;
  }
  .switch input:checked + .slide { background: var(--accent); }
  .switch input:checked + .slide::before { transform: translateX(16px); }

  .btn {
    width: 100%; padding: 9px; border: none; border-radius: 6px;
    background: var(--accent); color: #04222b; font-weight: 700; font-size: 13px;
    cursor: pointer; letter-spacing: .3px;
  }
  .btn:hover { background: var(--accent-hover); }
  .btn.ghost { background: transparent; border: 1px solid var(--border); color: var(--text); font-weight: 500; }
  .btn.ghost:hover { border-color: var(--accent); }
  .btn + .btn { margin-top: 8px; }
</style>
</head>
<body>

<div id="stage"></div>

<div id="panel">
  <h1>FishMod <span class="dot">·</span> HUD Editor</h1>
  <div class="sub">Live mockup — tweak in the browser</div>

  <div class="section">
    <div class="label">Global</div>
    <div class="ctrl">
      <label>Accent</label>
      <input type="color" id="accent" value="#00AACC">
    </div>
    <div class="ctrl">
      <label>BG opacity</label>
      <input type="range" id="bgOpacity" min="0" max="100" value="55">
      <span class="num" id="bgOpacityVal">55%</span>
    </div>
    <div class="ctrl">
      <label>Text size</label>
      <input type="range" id="textSize" min="10" max="20" value="13">
      <span class="num" id="textSizeVal">13px</span>
    </div>
  </div>

  <div class="section">
    <div class="label">Elements</div>
    <div id="elemControls"></div>
  </div>

  <button class="btn" id="exportBtn">Copy layout JSON</button>
  <button class="btn ghost" id="resetBtn">Reset positions</button>
</div>

<script>
  // ---- HUD element definitions (mirrors FishMod trackers) ----
  const ELEMENTS = [
    { id: "fishing",  name: "Fishing Tracker", x: 16,  y: 40,  scale: 1.0, on: true,
      html: `<div class="title">Fishing</div>
             <div class="row"><span>Sea Creatures</span><span class="val">1,204</span></div>
             <div class="row"><span>Per hour</span><span class="val">312/h</span></div>
             <div class="row"><span>Magmafish</span><span class="val">58</span></div>` },
    { id: "skill",    name: "Skill Tracker", x: 16,  y: 150, scale: 1.0, on: true,
      html: `<div class="title">Fishing XP</div>
             <div class="row"><span>Level 47</span><span class="val">62%</span></div>
             <div class="row"><span>XP/h</span><span class="val">1.4M</span></div>
             <div class="row"><span>ETA</span><span class="val">2h 11m</span></div>` },
    { id: "pet",      name: "Pet HUD", x: 16, y: 250, scale: 1.0, on: true,
      html: `<div class="title">Ammonite</div>
             <div class="row"><span>Lvl 92</span><span class="val">81%</span></div>` },
    { id: "soulflow", name: "Soulflow HUD", x: 0, y: 0, scale: 1.0, on: false,
      html: `<div class="title">Soulflow</div>
             <div class="row"><span>Stored</span><span class="val">24k</span></div>` },
  ];

  const stage = document.getElementById("stage");
  const elemControls = document.getElementById("elemControls");
  let state = JSON.parse(JSON.stringify(ELEMENTS));

  function renderHud() {
    stage.querySelectorAll(".hud").forEach(n => n.remove());
    state.forEach(el => {
      const node = document.createElement("div");
      node.className = "hud" + (el.on ? "" : " hidden");
      node.dataset.id = el.id;
      node.style.left = el.x + "px";
      node.style.top = el.y + "px";
      node.style.transform = `scale(${el.scale})`;
      node.innerHTML = el.html;
      makeDraggable(node, el);
      makeScalable(node, el);
      stage.appendChild(node);
    });
  }

  function makeDraggable(node, el) {
    let ox, oy;
    node.addEventListener("mousedown", e => {
      e.preventDefault();
      node.classList.add("dragging");
      ox = e.clientX - el.x;
      oy = e.clientY - el.y;
      const move = ev => {
        el.x = Math.max(0, ev.clientX - ox);
        el.y = Math.max(0, ev.clientY - oy);
        node.style.left = el.x + "px";
        node.style.top = el.y + "px";
      };
      const up = () => {
        node.classList.remove("dragging");
        document.removeEventListener("mousemove", move);
        document.removeEventListener("mouseup", up);
      };
      document.addEventListener("mousemove", move);
      document.addEventListener("mouseup", up);
    });
  }

  function makeScalable(node, el) {
    node.addEventListener("wheel", e => {
      e.preventDefault();
      const step = e.deltaY < 0 ? 0.1 : -0.1;
      el.scale = Math.max(0.5, Math.min(3, Math.round((el.scale + step) * 100) / 100));
      node.style.transform = `scale(${el.scale})`;
      syncControls();
    }, { passive: false });
  }

  function renderControls() {
    elemControls.innerHTML = "";
    state.forEach(el => {
      const card = document.createElement("div");
      card.className = "elem-card";
      card.innerHTML = `
        <div class="head">
          <span class="name">${el.name}</span>
          <label class="switch">
            <input type="checkbox" data-id="${el.id}" class="toggle" ${el.on ? "checked" : ""}>
            <span class="slide"></span>
          </label>
        </div>
        <div class="ctrl">
          <label>Scale</label>
          <input type="range" class="scale" data-id="${el.id}" min="50" max="300" value="${el.scale*100}">
          <span class="num scaleval" data-id="${el.id}">${el.scale.toFixed(2)}x</span>
        </div>`;
      elemControls.appendChild(card);
    });

    elemControls.querySelectorAll(".toggle").forEach(t => t.addEventListener("change", e => {
      state.find(x => x.id === e.target.dataset.id).on = e.target.checked;
      renderHud();
    }));
    elemControls.querySelectorAll(".scale").forEach(s => s.addEventListener("input", e => {
      const el = state.find(x => x.id === e.target.dataset.id);
      el.scale = e.target.value / 100;
      syncControls();
      renderHud();
    }));
  }

  function syncControls() {
    state.forEach(el => {
      const r = elemControls.querySelector(`.scale[data-id="${el.id}"]`);
      const v = elemControls.querySelector(`.scaleval[data-id="${el.id}"]`);
      if (r) r.value = el.scale * 100;
      if (v) v.textContent = el.scale.toFixed(2) + "x";
    });
  }

  // ---- Global controls ----
  const accent = document.getElementById("accent");
  accent.addEventListener("input", e => {
    document.documentElement.style.setProperty("--accent", e.target.value);
    document.documentElement.style.setProperty("--accent-hover", e.target.value);
  });

  const bgOpacity = document.getElementById("bgOpacity");
  bgOpacity.addEventListener("input", e => {
    const a = e.target.value / 100;
    document.getElementById("bgOpacityVal").textContent = e.target.value + "%";
    document.querySelectorAll(".hud").forEach(n => n.style.background = `rgba(8,12,16,${a})`);
  });

  const textSize = document.getElementById("textSize");
  textSize.addEventListener("input", e => {
    document.getElementById("textSizeVal").textContent = e.target.value + "px";
    document.querySelectorAll(".hud").forEach(n => n.style.fontSize = e.target.value + "px");
  });

  document.getElementById("resetBtn").addEventListener("click", () => {
    state = JSON.parse(JSON.stringify(ELEMENTS));
    renderControls();
    renderHud();
  });

  document.getElementById("exportBtn").addEventListener("click", () => {
    const layout = state.map(e => ({ id: e.id, x: e.x, y: e.y, scale: e.scale, on: e.on }));
    const json = JSON.stringify(layout, null, 2);
    navigator.clipboard.writeText(json).then(
      () => alert("Layout copied to clipboard:\n\n" + json),
      () => prompt("Copy layout JSON:", json)
    );
  });

  renderControls();
  renderHud();
</script>
</body>
</html>
